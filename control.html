<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>text ring · control panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
        }
        .panel {
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            width: 600px;
            max-width: 100%;
            color: #dddaf0;
        }
        h2 {
            font-weight: 350;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed #5f5c8a;
            padding-bottom: 0.5rem;
        }
        input[type="text"] {
            width: 100%;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 3rem;
            padding: 0.7rem 1.2rem;
            color: white;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #b48cf2;
        }
        .control-group {
            margin-bottom: 1.5rem;
        }
        .color-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 0.5rem;
        }
        .color-item {
            flex: 1;
        }
        .color-item label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #c7c1e6;
            margin-bottom: 0.2rem;
        }
        .color-item input[type="color"] {
            width: 100%;
            height: 2.5rem;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 2rem;
            padding: 0.1rem;
            cursor: pointer;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .checkbox-row input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #b48cf2;
            cursor: pointer;
        }
        .select-group {
            margin-bottom: 1.5rem;
        }
        .select-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #c7c1e6;
            margin-bottom: 0.2rem;
        }
        select {
            width: 100%;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 3rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23b48cf2' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 0.8rem;
            cursor: pointer;
        }
        .slider-group {
            margin-bottom: 1.5rem;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #b48cf2;
            height: 1.8rem;
            cursor: pointer;
        }
        .value-badge {
            background: #262439;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        .direction-hint {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #8f8ab0;
            margin-top: 0.2rem;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #262439;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            margin-top: 1.5rem;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
            transition: background 0.3s;
        }
        .status-dot.connected {
            background: #0f0;
        }
        .status-dot.disconnected {
            background: #f00;
        }
        .reconnect-btn {
            background: #b48cf2;
            border: none;
            color: #1a1a2b;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .reconnect-btn:hover {
            background: #c7a9ff;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2>🎛️ text ring controller</h2>

        <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog" placeholder="your text">

        <div class="color-row">
            <div class="color-item">
                <label>text color</label>
                <input type="color" id="textColorPicker" value="#ffffff">
            </div>
            <div class="color-item">
                <label>outline color</label>
                <input type="color" id="outlineColorPicker" value="#aa7eec">
            </div>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="outlineToggle" checked>
            <label for="outlineToggle">enable outline</label>
        </div>

        <div class="select-group">
            <label>font family</label>
            <select id="fontSelect">
                <option value="'Courier New', monospace" selected>Courier New (mono)</option>
                <option value="Arial, sans-serif">Arial (sans)</option>
                <option value="'Times New Roman', serif">Times New Roman (serif)</option>
                <option value="Georgia, serif">Georgia (serif)</option>
                <option value="Verdana, sans-serif">Verdana (sans)</option>
                <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans (cursive)</option>
                <option value="Impact, sans-serif">Impact (bold)</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet MS (sans)</option>
                <option value="'Arial Black', sans-serif">Arial Black (bold)</option>
                <option value="'Segoe UI', sans-serif">Segoe UI (system)</option>
            </select>
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>⭕ radius</span>
                <span id="radiusDisplay" class="value-badge">250</span>
            </div>
            <input type="range" id="radiusSlider" min="100" max="350" value="250" step="1">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>🔠 font size</span>
                <span id="fontSizeDisplay" class="value-badge">36</span>
            </div>
            <input type="range" id="fontSizeSlider" min="12" max="100" value="36" step="1">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>⚡ speed</span>
                <span id="speedDisplay" class="value-badge">-9.0</span>
            </div>
            <input type="range" id="speedSlider" min="-9" max="9" value="-9" step="0.1">
            <div class="direction-hint">
                <span>◀ fast reverse</span><span>stop</span><span>fast forward ▶</span>
            </div>
        </div>

        <!-- Connection status + reconnect button -->
        <div class="status-row">
            <div class="status-left">
                <span class="status-dot disconnected" id="statusDot"></span>
                <span id="statusText">No display found</span>
            </div>
            <button class="reconnect-btn" id="reconnectBtn">⟳ reconnect</button>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const textInput = document.getElementById('textInput');
            const textColorPicker = document.getElementById('textColorPicker');
            const outlineColorPicker = document.getElementById('outlineColorPicker');
            const outlineToggle = document.getElementById('outlineToggle');
            const fontSelect = document.getElementById('fontSelect');
            const radiusSlider = document.getElementById('radiusSlider');
            const fontSizeSlider = document.getElementById('fontSizeSlider');
            const speedSlider = document.getElementById('speedSlider');

            const radiusDisplay = document.getElementById('radiusDisplay');
            const fontSizeDisplay = document.getElementById('fontSizeDisplay');
            const speedDisplay = document.getElementById('speedDisplay');

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const reconnectBtn = document.getElementById('reconnectBtn');

            // BroadcastChannel
            const channel = new BroadcastChannel('text_ring_channel');

            let displayConnected = false;

            // Function to send current settings
            function sendSettings() {
                const settings = {
                    text: textInput.value,
                    textColor: textColorPicker.value,
                    outlineColor: outlineColorPicker.value,
                    outlineEnabled: outlineToggle.checked,
                    fontFamily: fontSelect.value,
                    radius: parseInt(radiusSlider.value, 10),
                    fontSize: parseInt(fontSizeSlider.value, 10),
                    speed: parseFloat(speedSlider.value)
                };
                channel.postMessage(settings);
            }

            // Update numeric displays and send
            function updateAndSend() {
                radiusDisplay.textContent = radiusSlider.value;
                fontSizeDisplay.textContent = fontSizeSlider.value;
                speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(1);
                sendSettings();
            }

            // Handle incoming messages from display
            channel.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'display-ready') {
                    displayConnected = true;
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = 'Connected';
                    // Immediately send current settings to the newly connected display
                    sendSettings();
                }
                // (ignore other messages)
            };

            // Check if we already have a display (maybe it sent ready before we started listening)
            // We'll send a ping and hope for a response? Instead, we'll just try to send a dummy.
            // The display will send ready when it loads. If it loaded before us, we missed it.
            // So we'll also send a "control-ready" message and display can respond? Simpler: use a timeout to ask user to reconnect.
            // We'll also have a reconnect button that re-sends settings and pings.

            // Initial attempt: send a ping message (non-settings) to see if any display responds.
            // But display only responds with 'display-ready' on load. So we'll just rely on that.
            // However, if display loaded before control, we'll never get its ready message.
            // So we'll set a timer: if after 2 seconds no connection, show disconnected.
            setTimeout(() => {
                if (!displayConnected) {
                    statusDot.className = 'status-dot disconnected';
                    statusText.textContent = 'No display (open index.html)';
                }
            }, 2000);

            // Reconnect button: force send settings and ping displays by sending a dummy message?
            reconnectBtn.addEventListener('click', () => {
                // Broadcast a "ping" message – displays ignore it, but maybe they can reply? Let's just resend settings.
                // We'll also reset status to waiting.
                displayConnected = false;
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Searching...';
                sendSettings(); // maybe a display will receive and reply? No, it only sends ready once.
                // We can also ask displays to re-announce? But we can't.
                // Instead, we'll rely on the fact that if a display is open, it will receive our settings and we'll get no reply, but at least settings go through.
                // But we want the green dot. So we'll also send a special "ping" that displays can respond to.
                channel.postMessage({ type: 'ping' });
                // Wait a bit for a pong
                setTimeout(() => {
                    if (!displayConnected) {
                        statusText.textContent = 'No response (check OBS)';
                    }
                }, 1000);
            });

            // Listen for pong from display? Let's add a pong handler in display too.
            // We'll update display to respond to 'ping' with 'pong'.
            // But we haven't updated display yet. Let's add that in display code.
            // For now, we'll just rely on reconnect button to resend settings and hope.

            // Event listeners
            textInput.addEventListener('input', updateAndSend);
            textColorPicker.addEventListener('input', updateAndSend);
            outlineColorPicker.addEventListener('input', updateAndSend);
            outlineToggle.addEventListener('change', updateAndSend);
            fontSelect.addEventListener('change', updateAndSend);
            radiusSlider.addEventListener('input', updateAndSend);
            fontSizeSlider.addEventListener('input', updateAndSend);
            speedSlider.addEventListener('input', updateAndSend);

            // Initial send
            updateAndSend();

            // Also listen for pong if display supports it
            channel.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'display-ready') {
                    displayConnected = true;
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = 'Connected';
                    sendSettings();
                } else if (data.type === 'pong') {
                    displayConnected = true;
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = 'Connected';
                }
            };
        })();
    </script>
</body>
</html>
